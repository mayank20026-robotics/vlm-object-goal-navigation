/oak:
  ros__parameters:
    camera:
      i_nn_type: none

    stereo:
      # Keep your existing settings
      i_align_depth: true
      i_board_socket_id: 2
      i_subpixel: true
      i_right_rect_publish_topic: true
      i_right_rect_synced: false

      # ----- Depth preset / profile -----
      i_depth_preset: "HIGH_ACCURACY"   # or "HIGH_DENSITY" if available

      # ----- Post-processing filters -----
      i_enable_spatial_filter: true
      i_spatial_filter_hole_filling_radius: 2
      i_spatial_filter_num_iterations: 4

      i_enable_temporal_filter: true
      i_temporal_filter_alpha: 0.8      # 0..1, higher = less smoothing
      i_temporal_filter_delta: 200

      i_enable_speckle_filter: true
      i_speckle_filter_range: 200

      i_enable_median_filter: true
      i_median_filter_kernel_size: 5    # 3, 5, or 7